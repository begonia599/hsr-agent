services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hsr-agent-postgres
    environment:
      POSTGRES_DB: hsr_agent
      POSTGRES_USER: hsr
      POSTGRES_PASSWORD: hsr
    ports:
      - "55432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsr -d hsr_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
